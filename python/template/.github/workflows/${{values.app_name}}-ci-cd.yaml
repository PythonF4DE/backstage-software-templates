name: ${{values.app_name}}-ci/cd

on:

  push:
    paths:
      - src/**
    branches:
      - main

  workflow_dispatch:

jobs:

  build-image:

    runs-on: ubuntu-latest

    steps:

      - name: Add tag var
        shell: bash
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: stimulatedriot/${{values.app_name}}:${{ '${{ env.COMMIT_ID }}' }}
    outputs:
      commit_id: ${{ '${{ env.COMMIT_ID }}' }}

  deploy-app:

    needs: build-image

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v3

      - name: Modify values file
        shell: bash
        run: |
          sudo apt update
          sudo apt install python3 -y
          sudo apt install python3-pip -y
          sudo apt install yq -y
          yq -Yi '.image.tag = "${{ '${{ needs.build-image.outputs.commit_id }}' }}"' charts/${{values.app_name}}/values-${{values.app_env}}.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Updates values.yaml with commit ${{ '${{ needs.build-image.outputs.commit_id }}' }}"

      - name: Install Argocd CLI
        shell: bash
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd

      - name: Log in to ArgoCD
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}

      - name: Create repo if not created
        shell: bash
        run: |
          repo="https://github.com/divine-riot-enterprise/${{values.app_name}}.git"
          argocd repo list | grep -q $repo || argocd repo add $repo

          argocd app get ${{values.app_name}} || argocd app create ${{values.app_name}} \
            --repo $repo \
            --path charts/${{values.app_name}} \
            --dest-namespace ${{values.app_env}} \
            --dest-server https://kubernetes.default.svc \
            --values values-${{values.app_env}}.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true

      - name: Argocd app sync
        shell: bash
        run: |
          argocd app sync ${{values.app_name}}
          argocd app wait ${{values.app_name}} --timeout 180